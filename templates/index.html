<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARXY Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1573348722427-f1d6819fdf98?q=80&w=1074&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') no-repeat center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Blur overlay */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(3px);
    background: rgba(0, 0, 0, 0.6);
}

/* Main container */
.container {
    position: relative;
    text-align: center;
    color: white;
}

/* Title */
.title {
    font-size: 60px;
    letter-spacing: 15px;
    color: #d4af37;
    margin-bottom: 30px;
}

/* Glass card */
.card {
    width: 380px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

/* Logo circle */
.logo {
    font-size: 28px;
    color: #d4af37;
    margin-bottom: 10px;
}

.card h2 {
    font-weight: 500;
    margin-bottom: 5px;
}

.subtitle {
    font-size: 13px;
    color: #ccc;
    margin-bottom: 20px;
}

/* Inputs */
.input-box {
    text-align: left;
    margin-bottom: 15px;
}

.input-box label {
    font-size: 13px;
    color: #ccc;
    margin-bottom: 5px;
    display: block;
}

.input-box input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.4);
    color: white;
    outline: none;
}

.messages {
    margin-bottom: 16px;
}

.message {
    padding: 12px 14px;
    border-radius: 12px;
    margin-bottom: 10px;
    font-size: 14px;
    text-align: left;
}

.message.success {
    background: rgba(34, 197, 94, 0.18);
    border: 1px solid rgba(34, 197, 94, 0.35);
    color: #bbf7d0;
}

.message.error {
    background: rgba(239, 68, 68, 0.18);
    border: 1px solid rgba(239, 68, 68, 0.35);
    color: #fecaca;
}

/* Button */
.btn {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #d4af37, #f1d27a);
    color: black;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.03);
}

/* Divider */
.divider {
    margin: 20px 0;
    display: flex;
    align-items: center;
    color: #aaa;
    font-size: 13px;
}

.divider::before,
.divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.2);
}

.divider span {
    margin: 0 10px;
}

/* Footer */
.footer {
    font-size: 13px;
    color: #aaa;
}

.footer a {
    color: #d4af37;
    text-decoration: none;
}
</style>

</head>
<body>

<div class="container">
    <div class="title">PARXY</div>

    <div class="card">
        <!-- <div class="logo">P</div> -->

        <h2>Welcome to PARXY</h2>
        <div class="subtitle">Sign in to continue</div>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'login_user' %}">
            {% csrf_token %}
            <div class="input-box">
                <label>Phone Number</label>
                <input type="tel" name="phone" placeholder="9xxxxxxxxxx" required>
            </div>

            <div class="input-box">
                <label>Date of Birth</label>
                <input type="text" name="dob" placeholder="DDMMYY" required>
            </div>

            <button class="btn" type="submit">LOGIN</button>
        </form>

        <div class="divider"><span>or</span></div>

        <div class="footer">
            New to PARXY? <a href="#">Create an account</a>
        </div>
    </div>
</div>

</body>
</html>
