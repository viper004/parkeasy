<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkEasy Admin Dashboard</title>
    <style>
        :root {
            --bg: #f4efe6;
            --panel: #fffaf2;
            --ink: #1f2937;
            --muted: #6b7280;
            --accent: #c2410c;
            --accent-soft: #fed7aa;
            --border: #eadfce;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(194, 65, 12, 0.14), transparent 24%),
                linear-gradient(135deg, #f7f1e8, var(--bg));
            padding: 32px;
        }

        .shell {
            max-width: 980px;
            margin: 0 auto;
        }

        .hero {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(31, 41, 55, 0.08);
        }

        .eyebrow {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 18px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 5vw, 3.5rem);
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
            font-size: 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            margin-top: 28px;
        }

        .card {
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 20px;
            padding: 22px;
        }

        .card span {
            display: block;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .card strong {
            font-size: 1.1rem;
        }

        .actions {
            margin-top: 28px;
        }

        .logout-link {
            display: inline-block;
            padding: 14px 18px;
            border-radius: 14px;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="hero">
            <div class="eyebrow">Admin Workspace</div>
            <h1>Welcome, {{ admin_name|default:"Admin" }}</h1>
            <p>You are signed in through the shared ParkEasy login form and have been redirected to the admin dashboard.</p>

            <div class="grid">
                <div class="card">
                    <span>Name</span>
                    <strong>{{ admin_name|default:"Admin" }}</strong>
                </div>
                <div class="card">
                    <span>Email</span>
                    <strong>{{ admin_email }}</strong>
                </div>
            </div>

            <div class="actions">
                <a class="logout-link" href="{% url 'logout_user' %}">Logout</a>
            </div>
        </section>
    </main>
</body>
</html>
